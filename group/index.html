<!DOCTYPE html> <html lang="en"> <head> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> <meta charset="utf-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title> Group | Jae-Hong Lee </title> <meta name="description" content="Jae-Hong Lee is an Assistant Professor in the Division of Language &amp; AI at Hankuk University of Foreign Studies."> <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E"> <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111111;
        --muted: #686868;
        --line: #e8e8e8;
        --link: #1f5fbf;
        --link-hover: #0b3f8a;
        --max: 680px;
      }

      html[data-theme="dark"] {
        --bg: #111111;
        --fg: #eeeeee;
        --muted: #a6a6a6;
        --line: #2b2b2b;
        --link: #8ab4f8;
        --link-hover: #b7d1ff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.65;
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover {
        color: var(--link-hover);
        text-decoration: underline;
      }

      .site {
        width: min(var(--max), calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 44px;
      }

      .theme-toggle {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .theme-toggle button {
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      .theme-toggle button[aria-pressed="true"] {
        color: var(--fg);
      }

      .site-title {
        margin: 0 0 12px;
        text-align: center;
        font-size: 22px;
        font-weight: 650;
        line-height: 1.2;
      }

      .site-title a {
        color: var(--fg);
      }

      header {
        margin-bottom: 38px;
      }

      .nav {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-bottom: 0;
        font-size: 14px;
      }

      .nav a {
        color: var(--fg);
      }

      .nav a.active {
        font-weight: 650;
      }

      main {
        width: 100%;
      }

      .profile-photo {
        display: block;
        width: 142px;
        height: 182px;
        margin: 0 auto 26px;
        border-radius: 6px;
        object-fit: cover;
        object-position: center;
      }

      h1,
      h2,
      h3,
      h4 {
        color: var(--fg);
        line-height: 1.25;
      }

      h1 {
        margin: 0 0 18px;
        text-align: center;
        font-size: 24px;
        font-weight: 650;
      }

      h2 {
        margin: 38px 0 14px;
        font-size: 22px;
        font-weight: 650;
      }

      h3 {
        margin: 28px 0 10px;
        font-size: 18px;
        font-weight: 650;
      }

      h4 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      p {
        margin: 0 0 16px;
      }

      ul,
      ol {
        padding-left: 20px;
      }

      .intro {
        text-align: left;
      }

      .identity {
        margin: 0 0 30px;
        text-align: center;
        color: var(--muted);
        line-height: 1.5;
      }

      .identity p {
        margin-bottom: 4px;
      }

      .identity .role {
        color: var(--fg);
        font-weight: 600;
      }

      .links {
        margin: 22px 0 30px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .links a {
        margin: 0 6px;
        white-space: nowrap;
      }

      .contact {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
      }

      .contact p {
        margin-bottom: 8px;
      }

      .publications {
        margin-top: 22px;
      }

      .publication-source {
        margin-bottom: 28px;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
      }

      h2.bibliography {
        margin: 34px 0 14px;
        padding: 0;
        text-align: left;
        font-size: 20px;
      }

      ol.bibliography,
      ul.bibliography {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      ol.bibliography li,
      ul.bibliography li {
        margin: 0 0 22px;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }

      .bibliography .title {
        color: var(--fg);
        font-weight: 650;
      }

      .bibliography .author,
      .bibliography .periodical,
      .bibliography .links,
      .bibliography .abstract,
      .bibliography .award,
      .bibliography .annotation {
        color: var(--muted);
        font-size: 14px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      footer {
        margin-top: 48px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        text-align: center;
        font-size: 13px;
      }

      @media (max-width: 560px) {
        .site {
          width: min(100% - 26px, var(--max));
          padding-top: 24px;
        }

        .nav {
          gap: 13px;
          margin-bottom: 30px;
        }

        .profile-photo {
          width: 124px;
          height: 159px;
        }
      }
    </style> <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script> </head> <body> <div class="site"> <div class="theme-toggle" aria-label="Theme"> <button type="button" data-theme-choice="light">LIGHT</button> <button type="button" data-theme-choice="dark">DARK</button> </div> <header> <p class="site-title"><a href="/">Jae-Hong Lee</a></p> <nav class="nav" aria-label="Main navigation"> <a href="/"> Home </a> <a href="/publications/"> Publications </a> </nav> </header> <main> <h1 id="group">Group</h1> <p>Group information will be added after the member list is finalized.</p> </main> <footer> Copyright 2026 Jae-Hong Lee. All rights reserved. </footer> </div> <script>
      (function () {
        var current = document.documentElement.getAttribute("data-theme");
        var buttons = document.querySelectorAll("[data-theme-choice]");
        function setTheme(theme) {
          document.documentElement.setAttribute("data-theme", theme);
          localStorage.setItem("theme", theme);
          buttons.forEach(function (button) {
            button.setAttribute("aria-pressed", String(button.dataset.themeChoice === theme));
          });
        }
        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            setTheme(button.dataset.themeChoice);
          });
        });
        setTheme(current);
      })();
    </script> </body> </html>
